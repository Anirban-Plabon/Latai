# Secure Local Configuration Structure
# Best Practice: Keep this in ~/.config/your_agent_name/models.yaml and out of your git history!

providers:
  openai:
    api_key: "sk-proj-your-openai-key-here"
    # One key unlocks a defined list of distinct options
    models:
      - id: "gpt-4o"
        label: "GPT-4o"
      - id: "gpt-4o-mini"
        label: "GPT-4o Mini"

  anthropic:
    api_key: "sk-ant-your-anthropic-key-here"
    models:
      - id: "claude-3-5-sonnet-latest"
        label: "Claude 3.5 Sonnet"
      - id: "claude-3-5-haiku-latest"
        label: "Claude 3.5 Haiku"

  gemini:
    api_key: "AI****" 
    models:
      - id: "gemini-2.5-flash"
        label: "Gemini 2.5 Flash"
      - id: "gemini-2.5-flash-lite"
        label: "Gemini 2.5 Flash Lite"
      - id: "gemini-3-flash-preview"
        label: "Gemini 3 Flash Preview"
      - id: "gemini-3.1-flash-lite-preview"
        label: "Gemini 3.1 Flash Lite Preview"


  openrouter:
    # No top-level api_key here because keys are isolated per model!
    models:
      - id: "openai/gpt-oss-20b:free"
        label: "gpt-oss-20b"
        api_key: "sk****" # Specific key for Gemma
      - id: "mistralai/mistral-7b-instruct:free"
        label: "Mistral 7B (Free)"
        api_key: "sk-or-v1-mistral-specific-key..." # Specific key for Mistral

  ollama:
    base_url: "http://localhost:11434"
    # Populated dynamically via your backend code (via GET /api/tags)
    models: [] 

defaults:
  provider: "gemini"
  model: "gemini-3.1-flash-lite-preview"